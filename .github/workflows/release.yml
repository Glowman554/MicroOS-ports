name: Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex libgmp-dev libmpc-dev libmpfr-dev \
            texinfo wget curl git xorriso autoconf automake \
            libtool pkg-config

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: .toolchain
          key: toolchain-${{ hashFiles('toolchain/build.sh', 'toolchain/libc/**') }}

      - name: Build toolchain
        run: |
          if [ ! -f ".toolchain/bin/i686-microos-gcc" ]; then
            cd toolchain
            bash build.sh
          fi

      - name: Build ports
        run: bash build.sh

      - name: Build ISO
        run: bash inject.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: microos
          path: microos.iso
